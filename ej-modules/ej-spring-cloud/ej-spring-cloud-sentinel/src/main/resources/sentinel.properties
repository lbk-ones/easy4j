# ============================================================
# Spring Cloud Alibaba Sentinel 配置文件
# ============================================================

# ============================================================
# 核心开关配置
# ============================================================

# 是否启用 Sentinel，默认为 true
spring.cloud.sentinel.enabled=true

# 是否在 Spring 容器启动时早期初始化心跳连接（当 transport 依赖在 classpath 时有效）
spring.cloud.sentinel.eager=false

# ============================================================
# 流量控制页面配置
# ============================================================

# 触发流控时的处理页面（支持 URL 或 HTML）
# 示例：/sentinel/block 或 classpath:sentinel-block.html
#spring.cloud.sentinel.block-page=/sentinel/block

# ============================================================
# Transport 配置（与 Dashboard 通信）
# ============================================================

# Sentinel API 服务端口，默认 8719
# 用于与 Dashboard 心跳连接、获取规则等
#spring.cloud.sentinel.transport.port=8719

# Sentinel Dashboard 地址，为空则不连接 Dashboard
# 示例：localhost:8080 或 sentinel-dashboard.example.com:8080
#spring.cloud.sentinel.transport.dashboard=localhost:8080

# 心跳间隔时间（毫秒），默认 10000ms（10秒）
spring.cloud.sentinel.transport.heartbeat-interval-ms=10000

# 客户端本地 IP，不配置时将使用本机 IP
# 用于 Dashboard 识别该客户端的来源
# spring.cloud.sentinel.transport.client-ip=192.168.1.100

# ============================================================
# Metric 配置（指标统计）
# ============================================================

# 单个 metric 文件的大小（字节），默认由 SentinelConfig 定义
# 示例：52428800（50MB）
# spring.cloud.sentinel.metric.file-single-size=52428800

# metric 文件的总数，默认由 SentinelConfig 定义
# 示例：10
# spring.cloud.sentinel.metric.file-total-count=10

# metric 文件的字符集，默认 UTF-8
spring.cloud.sentinel.metric.charset=UTF-8

# ============================================================
# Servlet 配置（Web 应用有效）
# ============================================================

# 注意：spring.cloud.sentinel.servlet.block-page 已弃用
# 请使用 spring.cloud.sentinel.block-page 代替
# spring.cloud.sentinel.servlet.block-page=/sentinel/block

# ============================================================
# Filter 配置（Web 拦截器）
# ============================================================

# 是否启用 Sentinel Web 拦截器
spring.cloud.sentinel.filter.enabled=true

# Sentinel Web 拦截器的执行顺序（值越小优先级越高）
# 默认为 Integer.MIN_VALUE（最高优先级）
spring.cloud.sentinel.filter.order=-2147483648

# 拦截的 URL 模式，默认为 /**（拦截所有请求）
# 多个模式用逗号分隔
spring.cloud.sentinel.filter.url-patterns=/**

# ============================================================
# Flow 配置（流控算法配置）
# ============================================================

# 冷启动因子（Cold Start Factor）
# 用于实现冷启动限流，值越小预热时间越长
# 默认值通常为 3
spring.cloud.sentinel.flow.cold-factor=3

# ============================================================
# Web 上下文配置
# ============================================================

# 是否统一 Web 上下文，默认为 true
# true：使用默认上下文名称（spring_application_default_context）
# false：为每个 URL 创建独立的上下文（可精细化控制，但资源消耗更大）
spring.cloud.sentinel.web-context-unify=true

# ============================================================
# HTTP 方法前缀配置
# ============================================================

# 是否为 Sentinel 资源添加 HTTP 方法前缀
# true：资源名称为 GET:/api/user（区分 HTTP 方法）
# false：资源名称为 /api/user（不区分 HTTP 方法）
#spring.cloud.sentinel.http-method-specify=false

# ============================================================
# Log 配置（日志）
# ============================================================

# Sentinel 日志输出目录
# 不配置时，默认在 ${user.home}/logs/csp/ 目录下
# spring.cloud.sentinel.log.dir=/var/log/sentinel

# 是否根据进程 ID (PID) 区分日志文件
# true：日志文件名包含 PID，多个进程不会冲突
# false：多个进程会写到同一个日志文件
spring.cloud.sentinel.log.switch-pid=false

# ============================================================
# DataSource 配置（规则数据源）
# ============================================================

# ========== 方式 1：Nacos 数据源 ==========
# 流控规则从 Nacos 动态拉取
#spring.cloud.sentinel.datasource.flow-rule.nacos.server-addr=localhost:8848
#spring.cloud.sentinel.datasource.flow-rule.nacos.dataId=sentinel-flow-rules
#spring.cloud.sentinel.datasource.flow-rule.nacos.groupId=DEFAULT_GROUP
#spring.cloud.sentinel.datasource.flow-rule.nacos.rule-type=flow

# 熔断降级规则从 Nacos 动态拉取
#spring.cloud.sentinel.datasource.degrade-rule.nacos.server-addr=localhost:8848
#spring.cloud.sentinel.datasource.degrade-rule.nacos.dataId=sentinel-degrade-rules
#spring.cloud.sentinel.datasource.degrade-rule.nacos.groupId=DEFAULT_GROUP
#spring.cloud.sentinel.datasource.degrade-rule.nacos.rule-type=degrade

# ========== 方式 2：Apollo 数据源 ==========
# spring.cloud.sentinel.datasource.flow-rule.apollo.namespace-name=application
# spring.cloud.sentinel.datasource.flow-rule.apollo.flow-rules-key=sentinel-flow-rules
# spring.cloud.sentinel.datasource.flow-rule.apollo.rule-type=flow

# ========== 方式 3：文件数据源（开发/测试环境） ==========
# spring.cloud.sentinel.datasource.flow-rule.file.file=classpath:flow-rules.json
# spring.cloud.sentinel.datasource.flow-rule.file.rule-type=flow
# spring.cloud.sentinel.datasource.degrade-rule.file.file=classpath:degrade-rules.json
# spring.cloud.sentinel.datasource.degrade-rule.file.rule-type=degrade

# ========== 方式 4：ZooKeeper 数据源 ==========
# spring.cloud.sentinel.datasource.flow-rule.zk.server-addr=localhost:2181
# spring.cloud.sentinel.datasource.flow-rule.zk.path=/sentinel/flow-rules
# spring.cloud.sentinel.datasource.flow-rule.zk.rule-type=flow

# ============================================================
# 规则示例（JSON 格式，用于文件数据源）
# ============================================================

# 流控规则 JSON 示例：
# [
#   {
#     "resource": "/api/user",
#     "limitApp": "default",
#     "grade": 1,
#     "count": 10,
#     "timeWindow": 1,
#     "controlBehavior": 0
#   }
# ]

# 熔断降级规则 JSON 示例：
# [
#   {
#     "resource": "/api/order",
#     "grade": 0,
#     "count": 50,
#     "timeWindow": 10,
#     "slowRatioThreshold": 0.5,
#     "minRequestAmount": 5,
#     "statIntervalMs": 1000
#   }
# ]

# ============================================================
# 日志级别配置
# ============================================================

# Sentinel 核心模块日志
logging.level.com.alibaba.csp.sentinel=INFO

# Sentinel DataSource 日志
logging.level.com.alibaba.cloud.sentinel.datasource=INFO

# Sentinel Spring Cloud 集成日志
logging.level.com.alibaba.cloud.sentinel=INFO



# ============================================
# Spring Cloud CircuitBreaker Sentinel Feign (熔断器)配置
# ============================================

# 1. 默认降级规则名称
feign.sentinel.default-rule=default

# 2. 是否启用从配置中心刷新规则
feign.sentinel.enable-refresh-rules=true

# 3. 定义具体的降级规则
# 格式：feign.sentinel.rules.{规则名称}[{索引}].{属性}={值}

# ============ 规则 1：user-service 降级规则 ============
#feign.sentinel.rules.user-service[0].resource=user-service
#feign.sentinel.rules.user-service[0].grade=0
#feign.sentinel.rules.user-service[0].count=5
#feign.sentinel.rules.user-service[0].timeWindow=60
#feign.sentinel.rules.user-service[0].minRequestAmount=5

# ============ 规则 2：order-service 降级规则 ============
#feign.sentinel.rules.order-service[0].resource=order-service
#feign.sentinel.rules.order-service[0].grade=0
#feign.sentinel.rules.order-service[0].count=10
#feign.sentinel.rules.order-service[0].timeWindow=30
#feign.sentinel.rules.order-service[0].minRequestAmount=10

# ============ 规则 3：default 默认降级规则 ============
feign.sentinel.rules.default[0].resource=default
feign.sentinel.rules.default[0].grade=1
feign.sentinel.rules.default[0].count=0.6
feign.sentinel.rules.default[0].timeWindow=60
feign.sentinel.rules.default[0].minRequestAmount=1

# ============ DegradeRule 属性说明 ============
# resource          - 资源名（FeignClient 服务名）
# grade             - 降级策略
#                    0 = 异常比例降级（默认）
#                    1 = 异常数降级
#                    2 = 响应时间降级
# count             - 降级阈值
#                    grade=0: 异常比例（0.0-1.0）
#                    grade=1: 异常数（绝对值）
#                    grade=2: 响应时间（毫秒）
# timeWindow        - 熔断持续时间（秒）
# minRequestAmount  - 触发降级的最小请求数
# slowRatioThreshold- 响应时间降级的比例阈值（grade=2时用）
# statIntervalMs    - 统计窗口时长（毫秒，默认 1000）