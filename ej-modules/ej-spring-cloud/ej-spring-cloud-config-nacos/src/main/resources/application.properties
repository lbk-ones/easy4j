# =========================
# 应用基础配置
# =========================
spring.application.name=demo-service
server.port=8080

# =========================
# Nacos Server 地址
# =========================
spring.cloud.nacos.server-addr=127.0.0.1:8848
spring.cloud.nacos.username=nacos
spring.cloud.nacos.password=nacos

# =========================
# 注册中心配置（服务发现）
# =========================
spring.cloud.nacos.discovery.enabled=true
spring.cloud.nacos.discovery.namespace=public
spring.cloud.nacos.discovery.group=DEFAULT_GROUP


# =========================
# 配置中心（Nacos Config）
# =========================
spring.cloud.nacos.config.enabled=true
spring.cloud.nacos.config.server-addr=${spring.cloud.nacos.server-addr}

# 配置 namespace / group
spring.cloud.nacos.config.namespace=public
spring.cloud.nacos.config.group=DEFAULT_GROUP

# 配置文件格式（支持: properties / yaml / yml）
spring.cloud.nacos.config.file-extension=properties
# 共享配置（可选：多个服务共用配置）
spring.config.import[0]=optional:nacos:data.properties
spring.config.import[1]=optional:nacos:data2.properties
# =========================
# 扩展配置（推荐）
# =========================

# 是否自动刷新配置
spring.cloud.nacos.config.refresh-enabled=true

# 读取配置超时时间
spring.cloud.nacos.config.timeout=3000